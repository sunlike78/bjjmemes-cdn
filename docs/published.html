<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Опубликованные мемы</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <h1 class="title">Опубликованные мемы</h1>
    <div class="counters" aria-live="polite">
      <span class="counter" data-counter="total">Всего: <b id="count-total">0</b></span>
      <span class="counter" id="generated-at"></span>
    </div>
    <div class="topbar-right">
      <a class="nav-link" href="index.html">&larr; Обзор</a>
      <a class="nav-link" href="accepted.html">Одобренные &rarr;</a>
      <a class="nav-link" href="rejected.html">Отклонённые &rarr;</a>
      <a class="nav-link" href="analytics.html">Аналитика &rarr;</a>
    </div>
  </div>
</header>

<main id="gallery" class="gallery gallery-grid" aria-live="polite">
  <div class="empty-state" id="empty-state" hidden>
    <p>Загрузка&hellip;</p>
  </div>
</main>

<template id="card-template">
  <article class="card" data-id="">
    <a class="card-thumb-link" target="_blank" rel="noopener">
      <img class="card-thumb" loading="lazy" alt="" />
    </a>
    <div class="card-body">
      <div class="card-meta">
        <span class="category-badge"></span>
        <span class="card-posted"></span>
      </div>
      <div class="card-links">
        <a class="permalink" target="_blank" rel="noopener">
          <svg viewBox="0 0 24 24" width="14" height="14" aria-hidden="true">
            <rect x="3" y="3" width="18" height="18" rx="5" fill="none" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.8"/>
            <circle cx="17.5" cy="6.5" r="1" fill="currentColor"/>
          </svg>
          <span>Instagram</span>
        </a>
        <span class="card-id"></span>
      </div>
      <pre class="caption caption-collapsible" data-collapsed="true"></pre>
      <button class="caption-toggle btn btn-ghost" type="button" hidden>Развернуть подпись</button>
      <div class="stats-row" hidden></div>
      <details class="history">
        <summary>История действий</summary>
        <ol class="timeline"></ol>
      </details>
    </div>
  </article>
</template>

<template id="timeline-item-template">
  <li class="timeline-item">
    <span class="timeline-dot" aria-hidden="true"></span>
    <div class="timeline-body">
      <div class="timeline-row">
        <span class="timeline-event"></span>
        <span class="timeline-rel"></span>
      </div>
      <div class="timeline-ts"></div>
      <div class="timeline-extra"></div>
    </div>
  </li>
</template>

<script type="module" src="published.js"></script>
</body>
</html>
