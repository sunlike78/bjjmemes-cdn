<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Одобренные мемы (очередь)</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<header class="topbar">
  <div class="topbar-inner">
    <h1 class="title">Одобренные мемы (очередь)</h1>
    <div class="counters" aria-live="polite">
      <span class="counter" data-counter="total">Всего: <b id="count-total">0</b></span>
      <span class="counter" id="generated-at"></span>
      <span class="post-window-hint" title="Все времена в Europe/Berlin">
        Следующий слот публикации: 13:00 серьёзное / 19:00 мем
      </span>
    </div>
    <div class="topbar-right">
      <a class="nav-link" href="index.html">&larr; Обзор</a>
      <a class="nav-link" href="published.html">Опубликованные &rarr;</a>
      <a class="nav-link" href="rejected.html">Отклонённые &rarr;</a>
      <a class="nav-link" href="analytics.html">Аналитика &rarr;</a>
    </div>
  </div>
</header>

<main id="gallery" class="gallery gallery-grid" aria-live="polite">
  <div class="empty-state" id="empty-state" hidden>
    <p>Загрузка&hellip;</p>
  </div>
</main>

<template id="card-template">
  <article class="card card-accepted" data-id="">
    <a class="card-thumb-link" target="_blank" rel="noopener">
      <img class="card-thumb" loading="lazy" alt="" />
    </a>
    <div class="card-body">
      <div class="card-meta">
        <span class="category-badge"></span>
        <span class="card-queued-at"></span>
      </div>
      <div class="card-links">
        <span class="card-id"></span>
      </div>
      <pre class="caption caption-collapsible" data-collapsed="true"></pre>
      <button class="caption-toggle btn btn-ghost" type="button" hidden>Развернуть подпись</button>
      <details class="history">
        <summary>История действий</summary>
        <ol class="timeline"></ol>
      </details>
    </div>
  </article>
</template>

<template id="timeline-item-template">
  <li class="timeline-item">
    <span class="timeline-dot" aria-hidden="true"></span>
    <div class="timeline-body">
      <div class="timeline-row">
        <span class="timeline-event"></span>
        <span class="timeline-rel"></span>
      </div>
      <div class="timeline-ts"></div>
      <div class="timeline-extra"></div>
    </div>
  </li>
</template>

<script type="module" src="accepted.js"></script>
</body>
</html>
